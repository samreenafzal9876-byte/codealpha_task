{% extends "admin/index.html" %}
{% load i18n %}

{% block content %}
<div id="content-main" style="margin-bottom: 2rem; width: 100%;">
    <!-- Dashboard Stats Overview Grid -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 1rem; width: 100%;">
        
        <!-- Total Orders Card -->
        <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);">
            <p style="margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Total Orders</p>
            <p style="margin: 0.5rem 0 0; font-size: 2.25rem; font-weight: 800; color: #2563eb; line-height: 1;">{{ total_orders }}</p>
        </div>

        <!-- Total Revenue Card -->
        <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);">
            <p style="margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Total Revenue</p>
            <p style="margin: 0.5rem 0 0; font-size: 2.25rem; font-weight: 800; color: #16a34a; line-height: 1;">${{ total_revenue }}</p>
        </div>

        <!-- Total Products Card -->
        <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);">
            <p style="margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Active Products</p>
            <p style="margin: 0.5rem 0 0; font-size: 2.25rem; font-weight: 800; color: #7c3aed; line-height: 1;">{{ total_products }}</p>
        </div>

        <!-- Total Customers Card -->
        <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);">
            <p style="margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Total Customers</p>
            <p style="margin: 0.5rem 0 0; font-size: 2.25rem; font-weight: 800; color: #ea580c; line-height: 1;">{{ total_customers }}</p>
        </div>

    </div>
</div>

{{ block.super }}
{% endblock %}
