{% extends 'core/base.html' %}
{% load static %}

{% block title %}Settings - SocialSphere{% endblock %}
{% block layout_class %}no-right-sidebar{% endblock %}

{% block content %}
<main class="main-content" style="max-width: 600px; margin: 40px auto; padding: 0 20px;">
    <div class="feed-header" style="margin-bottom: 24px;">
        <h2 class="feed-title" style="font-size: 1.8rem; font-weight: 700; color: var(--text-primary);">
            <i class="fa-solid fa-gear" style="color: var(--primary); margin-right: 8px;"></i>
            Settings
        </h2>
    </div>

    <!-- Account Settings -->
    <div class="card" style="padding: 24px; margin-bottom: 20px;">
        <h3 style="font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 16px;">
            <i class="fa-solid fa-user-gear" style="margin-right: 8px; color: var(--primary);"></i>
            Account Settings
        </h3>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <a href="{% url 'edit_profile' %}" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg-body); border-radius: var(--radius-md); border: 1px solid var(--border-color); text-decoration: none; color: var(--text-primary); transition: border-color 0.3s;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-pen" style="color: var(--primary);"></i>
                    <span>Edit Profile</span>
                </div>
                <i class="fa-solid fa-chevron-right" style="color: var(--text-muted); font-size: 0.8rem;"></i>
            </a>
            <a href="{% url 'profile' username=request.user.username %}" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg-body); border-radius: var(--radius-md); border: 1px solid var(--border-color); text-decoration: none; color: var(--text-primary); transition: border-color 0.3s;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-eye" style="color: var(--primary);"></i>
                    <span>View Profile</span>
                </div>
                <i class="fa-solid fa-chevron-right" style="color: var(--text-muted); font-size: 0.8rem;"></i>
            </a>
        </div>
    </div>

    <!-- Danger Zone -->
    <div class="card" style="padding: 24px;">
        <h3 style="font-size: 1.1rem; font-weight: 600; color: var(--danger); margin-bottom: 16px;">
            <i class="fa-solid fa-triangle-exclamation" style="margin-right: 8px;"></i>
            Session
        </h3>
        <a href="{% url 'logout' %}" class="btn" style="background: var(--danger); color: white; padding: 10px 24px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-right-from-bracket"></i> Log Out
        </a>
    </div>
</main>
{% endblock %}
