<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - SocialSphere</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-layout" class="no-right-sidebar">
        <!-- Header & Sidebar injected by layout.js -->

        <main class="main-content">
            <div class="feed-header">
                <h2 class="feed-title">Edit Profile</h2>
            </div>

            <div class="card">
                <!-- Banner Preview -->
                <div class="form-group">
                    <label class="form-label">Banner Image</label>
                    <div id="banner-preview" style="position:relative; height:160px; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-color); background:var(--bg-glass-card); margin-bottom:8px;">
                        <img src="" id="banner-preview-img" alt="Banner" style="width:100%; height:100%; object-fit:cover;">
                        <button type="button" class="btn btn-sm btn-secondary" id="change-banner-btn" style="position:absolute; bottom:10px; right:10px;">
                            <i class="fa-solid fa-camera"></i> Change
                        </button>
                    </div>
                </div>

                <!-- Avatar Preview -->
                <div class="form-group">
                    <label class="form-label">Profile Photo</label>
                    <div style="display:flex; align-items:center; gap:20px;">
                        <div style="position:relative;">
                            <img src="" id="avatar-preview-img" alt="Avatar" style="width:90px; height:90px; border-radius:var(--radius-full); object-fit:cover; border:3px solid var(--border-color);">
                            <button type="button" class="btn btn-sm btn-secondary" id="change-avatar-btn" style="position:absolute; bottom:-4px; right:-4px; width:30px; height:30px; padding:0; border-radius:var(--radius-full);">
                                <i class="fa-solid fa-camera" style="font-size:0.7rem;"></i>
                            </button>
                        </div>
                        <span style="font-size:0.85rem; color:var(--text-muted);">Click the camera icon to change your photo (simulated)</span>
                    </div>
                </div>

                <!-- Display Name -->
                <div class="form-group">
                    <label class="form-label" for="edit-displayname">Display Name</label>
                    <input type="text" class="input-field" id="edit-displayname" placeholder="Your display name" maxlength="50">
                </div>

                <!-- Bio -->
                <div class="form-group">
                    <label class="form-label" for="edit-bio">Bio</label>
                    <textarea class="input-field" id="edit-bio" placeholder="Tell the world about yourself..." maxlength="160"></textarea>
                </div>

                <!-- Location -->
                <div class="form-group">
                    <label class="form-label" for="edit-location">Location</label>
                    <input type="text" class="input-field" id="edit-location" placeholder="Where are you based?">
                </div>

                <!-- Website -->
                <div class="form-group">
                    <label class="form-label" for="edit-website">Website</label>
                    <input type="text" class="input-field" id="edit-website" placeholder="yoursite.com">
                </div>

                <!-- Action Buttons -->
                <div style="display:flex; gap:12px; margin-top:28px;">
                    <button type="button" class="btn btn-primary" id="save-profile-btn">
                        <i class="fa-solid fa-check"></i> Save Changes
                    </button>
                    <a href="profile.html" class="btn btn-secondary">
                        <i class="fa-solid fa-xmark"></i> Cancel
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- Script imports -->
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/edit-profile.js"></script>
</body>
</html>
