<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - SocialSphere</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-layout" class="no-right-sidebar">
        <!-- Header & Sidebar injected by layout.js -->
        <main class="main-content">
            <div class="feed-header">
                <h2 class="feed-title">Notifications</h2>
                <button class="btn btn-secondary btn-sm" id="mark-all-read-btn">
                    <i class="fa-solid fa-check-double"></i> Mark all as read
                </button>
            </div>

            <!-- Notifications list container -->
            <div class="card" id="notifications-container" style="padding:0; overflow:hidden;">
                <!-- Notification items will be dynamically loaded here by notifications.js -->
            </div>

            <!-- Empty state (hidden by default) -->
            <div class="card" id="notifications-empty" style="display:none; text-align:center; padding:48px 24px;">
                <i class="fa-regular fa-bell-slash" style="font-size:2.5rem; color:var(--text-muted); margin-bottom:16px;"></i>
                <h3 style="font-weight:700; margin-bottom:8px;">No notifications</h3>
                <p style="color:var(--text-secondary); font-size:0.9rem;">When someone interacts with you, notifications will appear here.</p>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
