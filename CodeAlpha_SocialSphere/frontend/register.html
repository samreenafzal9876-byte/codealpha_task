<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SocialSphere</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-layout" class="full-width">
        <main class="main-content" style="max-width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
            <div class="auth-card" style="margin: 20px 0;">
                <div class="auth-header">
                    <div class="auth-logo">
                        <i class="fa-solid fa-circle-nodes"></i>
                        <span>SocialSphere</span>
                    </div>
                    <p class="auth-subtitle">Create an account and start sharing today</p>
                </div>
                
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-name" class="form-label">Full Name</label>
                        <input type="text" id="reg-name" class="input-field" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-username" class="form-label">Username</label>
                        <input type="text" id="reg-username" class="input-field" placeholder="john_doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-email" class="form-label">Email Address</label>
                        <input type="email" id="reg-email" class="input-field" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-password" class="form-label">Password</label>
                        <input type="password" id="reg-password" class="input-field" placeholder="••••••••" required>
                    </div>
                    
                    <div style="display:flex; align-items:flex-start; gap:8px; margin-bottom: 20px; font-size:0.8rem; color:var(--text-secondary);">
                        <input type="checkbox" id="reg-terms" required style="margin-top: 2px; cursor:pointer;">
                        <label for="reg-terms" style="cursor:pointer; line-height:1.4;">I agree to the Terms of Service and Privacy Policy</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full" style="padding: 12px 24px;">
                        Create Account <i class="fa-solid fa-user-plus"></i>
                    </button>
                </form>
                
                <div class="auth-footer">
                    Already have an account? <a href="login.html" class="btn-link">Sign In</a>
                </div>
            </div>
        </main>
    </div>
    
    <div id="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
